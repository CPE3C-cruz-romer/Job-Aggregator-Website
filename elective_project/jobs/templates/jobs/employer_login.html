<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Login - Job Aggregator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f3f4f6; }
        .wrap { max-width: 440px; margin: 44px auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; margin: 10px 0 0; box-sizing: border-box; }
        button, .google { width: 100%; margin-top: 16px; padding: 12px; border-radius: 8px; font-weight: 700; text-decoration: none; text-align: center; display: block; }
        button { border: none; background: #185FA5; color: white; }
        .google { border: 1px solid #d1d5db; color: #111; background: #fff; }
        .error { color: #b91c1c; }
    </style>
</head>
<body>
    <main class="wrap">
        <h2>Employer Login</h2>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        {% if google_oauth_enabled %}
            <a class="google" href="/auth/google/?next=/employers/dashboard/">Continue with Google</a>
        {% endif %}
        <p>No employer account yet? <a href="/employers/register/">Register here</a></p>
    </main>
</body>
</html>
