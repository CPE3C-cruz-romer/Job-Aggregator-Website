<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Register - Job Aggregator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f3f4f6; }
        .wrap { max-width: 520px; margin: 40px auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; }
        input, select, textarea{ width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; margin: 10px 0 0; box-sizing: border-box; }
        button, .google { width: 100%; margin-top: 16px; padding: 12px; border-radius: 8px; font-weight: 700; text-decoration: none; text-align: center; display: block; }
        button { border: none; background: #185FA5; color: white; }
        .google { border: 1px solid #d1d5db; color: #111; background: #fff; }
        .errorlist { color: #b91c1c; }
    </style>
</head>
<body>
    <main class="wrap">
        <h2>Create Employer Account</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register Employer</button>
        </form>
        {% if google_oauth_enabled %}
            <a class="google" href="/auth/google/?next=/employers/dashboard/">Continue with Google</a>
        {% endif %}
        <p>Already an employer? <a href="/employers/login/">Login here</a></p>
    </main>
</body>
</html>
