<!DOCTYPE html>
<html>
<head>
    <title>JobStream</title>
    <style>
        :root { --blue:#1f6fe5; --ink:#111827; --muted:#6b7280; --line:#e5e7eb; --bg:#f3f4f6; }
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin:0; color:var(--ink); background:var(--bg); }
        .topbar { background:#fff; border-bottom:1px solid var(--line); padding:14px 30px; }
        .topbar-inner { max-width:1100px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
        .brand { font-weight:800; font-size:28px; text-decoration:none; color:#111; }
        .brand span { color:var(--blue); }
        .nav a { margin-left:18px; text-decoration:none; color:#374151; font-size:14px; }
        .hero { max-width:900px; margin:40px auto; background:#fff; border:1px solid var(--line); border-radius:14px; padding:42px; text-align:center; }
        .hero h1 { margin-top:0; font-size:42px; }
        .actions { margin-top:18px; }
        .btn { display:inline-block; text-decoration:none; border-radius:8px; padding:10px 16px; margin:0 6px; font-weight:bold; }
        .btn-primary { background:var(--blue); color:white; }
        .btn-light { background:#eff6ff; color:var(--blue); }
        .footer { margin-top:35px; border-top:1px solid var(--line); text-align:center; padding:20px 10px; font-size:13px; color:#4b5563; background:#fff; }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="/">Job<span>Stream</span></a>
            <nav class="nav">
                <a href="/about/">Meet the Team</a>
            </nav>
        </div>
    </header>

    <main class="hero">
        <h1>Find your next role faster.</h1>
        <p style="color:var(--muted)">AI matching, resume scanning, and smart recommendations in one dashboard.</p>
        <div class="actions">
            <a class="btn btn-primary" href="/login/">Login</a>
            <a class="btn btn-light" href="/register/">Register</a>
        </div>
    </main>

    <footer class="footer">
        © 2026 JobStream Aggregator. Built with by BulSU Students.<br>
        Romer Cholo Cruz • Allan Valenzuela • Hugh Ariff Aserit • Eisen Liam
    </footer>
</body>
</html>
